<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ved Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;600;700&display=swap"
        rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; }

        body {
            background-color: rgb(1, 1, 50);
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 80px;
            background-color: rgba(31, 31, 133, 0.844);
        }

        nav ul {
            display: flex;
        }

        nav ul li {
            list-style: none;
            margin: 0 23px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
        }

        nav ul li a:hover {
            color: rgb(144, 104, 184);
            font-size: 1.05rem;
        }

        .firstSection {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 130px 0;
        }

        .leftSection { font-size: 3rem; width: 30%; }

        .leftSection .btn {
            padding: 12px;
            background: #1e2167;
            color: white;
            border: 2px solid white;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            margin-right: 10px;
        }

        .rightSection img {
            width: 60%;
        }

        .purple { color: rgb(144, 104, 184); }
        #element { color: rgb(144, 104, 184); }

        footer {
            background-color: #0e0e1a;
            padding: 20px;
            text-align: center;
            color: rgb(180, 180, 180);
        }
    </style>
</head>

<body>

    <header>
        <nav>
            <div class="left">Ved Ringne Portfolio</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="firstSection">
            <div class="leftSection">
                Hi, my name is <span class="purple">Ved</span>
                <div>and I am a passionate</div>
                <span id="element"></span>

                <div>
                    <button class="btn" onclick="window.open('VED RINGNE_Resume.pdf','_blank')">Download Resume</button>
                    <button class="btn" onclick="window.open('https://github.com/vedRingne','_blank')">Visit Github</button>
                </div>
            </div>

            <div class="rightSection">
                <img src="bg.jpg" alt="">
            </div>
        </section>
    </main>

    <footer>
        vedsportfolio.com
    </footer>

    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script>
        var typed = new Typed('#element', {
            strings: ['Web Developer', 'Python Developer', 'AI/ML Enthusiast'],
            typeSpeed: 50,
        });
    </script>
</body>

</html>
