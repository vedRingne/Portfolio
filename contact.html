<body>
    <nav>
        <div class="brand">Ved Ringne</div>

            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>

        </ul>

    <main class="container">
        <h1 class="page-title">Get In Touch</h1>
        <div class="contact-wrapper">
            <div class="contact-info">
                <h3>Drop me an email at:</h3>
                <a href="mailto:vedshamringne2603@gmail.com">vedshamringne2603@gmail.com</a>
                <h3 style="margin-top: 20px;">Connect on LinkedIn:</h3>
                <a href="https://www.linkedin.com/in/ved-ringne-b67482291/" target="_blank">LinkedIn Profile</a>
            </div>

            <form class="contact-form" action="https://formspree.io/f/your_form_id_here" method="POST">
                <div class="form-group">
                    <input type="text" class="form-control" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" class="form-control" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea class="form-control" name="message" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Send Message</button>
            </form>
            <p style="margin-top: 15px; font-size: 0.8rem; color: #888; text-align: center;">
                * Create an account on <a href="https://formspree.io/" target="_blank"
                    style="color: var(--accent-color);">Formspree</a> and replace 'your_form_id_here' in the code to
                receive emails.
            </p>
        </div>
